name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs files build manual _site/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=docs/">
            <link rel="canonical" href="docs/">
            <title>Three.js 中文文档</title>
          </head>
          <body>
            <p><a href="docs/">进入 Three.js 中文文档</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
