<!DOCTYPE html>

<body>
	<h1 translate="no">AudioContext</h1>
		<section>
			<header>
				<div class="class-description"><p>管理引擎中的全局音频上下文。</p></div>
			</header>
			<article>
				<div class="container-overview">
					<div class="method">
					</div>
				</div>
				<h2 class="subsection-title">静态方法</h2>
					<h3 class="name name-method" id=".getContext" translate="no">.<a href="#.getContext">getContext</a><span class="signature">()</span><span class="type-signature"> : Window.AudioContext</span> </h3>
					<div class="method">
						<div class="description">
							<p>返回全局原生音频上下文。</p>
						</div>
						<dl class="details">
							<dt class="tag-returns"><strong>返回值：</strong> 原生音频上下文。</dt>
						</dl>
					</div>
					<h3 class="name name-method" id=".setContext" translate="no">.<a href="#.setContext">setContext</a><span class="signature">( value : <span class="param-type">Window.AudioContext</span> )</span> </h3>
					<div class="method">
						<div class="description">
							<p>允许从外部设置全局原生音频上下文。</p>
						</div>
						<table class="params">
							<tbody>
								<tr>
									<td class="name">
										<strong translate="no">value</strong>
									</td>
									<td class="description last">
										<p>要设置的原生上下文。</p>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				<h2 class="subsection-title">源码</h2>
				<p>
					<a href="https://github.com/mrdoob/three.js/blob/master/src/audio/AudioContext.js" translate="no" target="_blank" rel="noopener">src/audio/AudioContext.js</a>
				</p>
			</article>
		</section>
<script src="../scripts/linenumber.js"></script>
